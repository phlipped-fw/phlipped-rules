title: PHL-D-002 — HID injection typing burst
id: 7f4e1c10-0001-4f1a-9c2e-phld002hidinj
status: experimental
description: |
  Detects shell / scripting host spawned by a foreground-less context immediately followed by
  a burst of keystrokes at machine speed, indicative of BadUSB / RubberDucky / O.MG cable
  injection into a locked or kiosk endpoint.
references:
  - https://github.com/phlipped-fw/phlipped-catalog/blob/main/threats/PHL-T-002.md
author: _AstroN0T
date: 2026/07/01
logsource:
  product: windows
  category: process_creation
detection:
  proc:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wscript.exe'
      - '\mshta.exe'
    ParentImage|endswith:
      - '\explorer.exe'
      - '\winlogon.exe'
  condition: proc
fields:
  - User
  - Image
  - ParentImage
  - CommandLine
falsepositives:
  - Legitimate admin scripting bursts (rare on locked sessions)
level: high
tags:
  - attack.initial_access
  - attack.t1200
  - attack.execution
  - attack.t1059.001
