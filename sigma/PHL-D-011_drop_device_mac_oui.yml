title: PHL-D-011 — Suspicious MAC OUI on non-IT VLAN
id: 7f4e1c10-0011-4f1a-9c2e-phld011oui
status: experimental
description: |
  Detects DHCP lease or NAC event for a MAC OUI belonging to common drop-device hardware
  (Raspberry Pi Foundation, Espressif, etc.) on a VLAN that should not host such devices.
references:
  - https://github.com/phlipped/phlipped-catalog/blob/main/threats/PHL-T-005.md
author: _AstroN0T
date: 2026/07/01
logsource:
  category: network
  service: dhcp
detection:
  oui:
    src_mac|startswith:
      - 'B8:27:EB'   # Raspberry Pi Foundation
      - 'DC:A6:32'   # Raspberry Pi Trading
      - 'E4:5F:01'   # Raspberry Pi Trading
      - '24:0A:C4'   # Espressif
      - '7C:DF:A1'   # Espressif
  not_it_vlan:
    vlan_id|expand: '%non_it_vlans%'
  condition: oui and not_it_vlan
fields:
  - src_mac
  - vlan_id
  - switch_port
falsepositives:
  - IT-approved Pi deployments (whitelist by MAC)
level: high
tags:
  - attack.initial_access
  - attack.t1200
